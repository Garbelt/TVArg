<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>TV Argentina</title>

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#111111">

<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

<style>

* { box-sizing: border-box; }

body {
    margin: 0;
    background: #000;
    color: white;
    font-family: Arial, sans-serif;
    display: flex;
    height: 100vh;
}

/* ===== SPLASH ===== */
#inicioTVArg {
    position: fixed;
    inset: 0;
    background: #000;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    gap: 20px;
    z-index: 9999;
}

#inicioTVArg button {
    padding: 18px 28px;
    font-size: 22px;
    border-radius: 10px;
    border: none;
    cursor: pointer;
}

#enterBtn {
    background: #0066cc;
    color: white;
}

#installBtn {
    background: #222;
    color: white;
    border: 1px solid #444;
    display: none;
}

/* ===== LAYOUT ===== */

#menu {
    width: 320px;
    background: #111;
    overflow-y: auto;
    border-right: 2px solid #222;
}

#titulo {
    padding: 20px;
    text-align: center;
    font-size: 28px;
    font-weight: bold;
    background: #1a1a1a;
}

.canal {
    padding: 18px;
    border-bottom: 1px solid #222;
    cursor: pointer;
    font-size: 20px;
}

.canal:hover {
    background: #0066cc;
}

#player {
    flex: 1;
    position: relative;
    background: black;
}

video {
    width: 100%;
    height: 100%;
}

#nombreCanal {
    position: absolute;
    top: 10px;
    left: 10px;
    z-index: 10;
    background: rgba(0,0,0,.7);
    padding: 10px 15px;
    border-radius: 10px;
}

#mensaje {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%,-50%);
    background: rgba(0,0,0,.8);
    padding: 20px;
    border-radius: 10px;
    display: none;
}

</style>
</head>

<body>

<!-- SPLASH -->
<div id="inicioTVArg">

    <button id="enterBtn">▶ Ingresar a TVArg</button>
    <button id="installBtn">📲 Instalar TVArg</button>

</div>

<!-- MENU -->
<div id="menu">
    <div id="titulo">📺 TV ARG</div>
</div>

<!-- PLAYER -->
<div id="player">

    <div id="nombreCanal">Seleccione un canal</div>
    <div id="mensaje"></div>

    <video id="video" controls autoplay></video>

</div>

<script>

const canales = [
    { nombre:"TN", tipo:"hls", url:"https://live-01-01-tn.vodgc.net/TN_DAI_Beta/index.m3u8" },
    { nombre:"Canal 26", tipo:"hls", url:"https://stream-gtlc.telecentro.net.ar/hls/canal26hls/main.m3u8" },
    { nombre:"C5N", tipo:"youtube", url:"https://www.youtube.com/watch?v=VWhQ6xspnSc" },
    { nombre:"Crónica", tipo:"hls", url:"https://g5.vxral-slo.transport.edge-access.net/a09/ngrp:cronicatv_video1-100044_all/Playlist.m3u8" },
    { nombre:"TV Pública", tipo:"youtube", url:"https://www.youtube.com/watch?v=eQLBmCEBp50" },
    { nombre:"DW", tipo:"hls", url:"https://dwamdstream104.akamaized.net/hls/live/2015530/dwstream104/master.m3u8" },
    { nombre:"Telefe", tipo:"web", url:"https://mitelefe.com/vivo/telefe-en-vivo/" }
];

const menu = document.getElementById("menu");
const video = document.getElementById("video");
const nombreCanal = document.getElementById("nombreCanal");
const mensaje = document.getElementById("mensaje");

const splash = document.getElementById("inicioTVArg");
const enterBtn = document.getElementById("enterBtn");
const installBtn = document.getElementById("installBtn");

let hls;
let deferredPrompt;

/* ===== SPLASH CONTROL ===== */

enterBtn.addEventListener("click", () => {
    splash.style.display = "none";
});

/* Si ya está instalada como app */
if (window.matchMedia('(display-mode: standalone)').matches ||
    window.navigator.standalone === true) {
    splash.style.display = "none";
}

/* ===== PWA INSTALL ===== */

window.addEventListener("beforeinstallprompt", (e) => {
    e.preventDefault();
    deferredPrompt = e;
    installBtn.style.display = "block";
});

installBtn.addEventListener("click", async () => {
    if (!deferredPrompt) return;

    deferredPrompt.prompt();
    await deferredPrompt.userChoice;

    deferredPrompt = null;
    installBtn.style.display = "none";
});

/* ===== PLAYER ===== */

function mostrarMensaje(texto){
    mensaje.textContent = texto;
    mensaje.style.display = "block";
    setTimeout(()=> mensaje.style.display = "none", 3000);
}

function cargarCanal(canal){

    nombreCanal.textContent = canal.nombre;
    video.pause();

    if(hls) hls.destroy();

    if(canal.tipo === "youtube" || canal.tipo === "web"){
        window.location.href = canal.url;
        return;
    }

    if(Hls.isSupported()){
        hls = new Hls();
        hls.loadSource(canal.url);
        hls.attachMedia(video);

        hls.on(Hls.Events.MANIFEST_PARSED, () => {
            video.play();
        });

        hls.on(Hls.Events.ERROR, () => {
            mostrarMensaje("Error cargando canal");
        });
    }
}

/* ===== MENU ===== */

canales.forEach(canal => {
    const div = document.createElement("div");
    div.className = "canal";
    div.textContent = canal.nombre;
    div.onclick = () => cargarCanal(canal);
    menu.appendChild(div);
});

</script>

</body>
</html>
