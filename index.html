<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>TV Argentina</title>

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#111111">

    
<style>

* { box-sizing: border-box; }

body {
    margin: 0;
    background: #000;
    color: white;
    font-family: Arial, sans-serif;
    display: flex;
    height: 100vh;
}

/* ===== SPLASH ===== */
#inicioTVArg {
    position: fixed;
    inset: 0;
    background: #000;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    gap: 20px;
    z-index: 9999;
}

#inicioTVArg button {
    padding: 18px 28px;
    font-size: 22px;
    border-radius: 10px;
    border: none;
    cursor: pointer;
}

#enterBtn { background: #0066cc; color: white; }

#installBtn {
    background: #222;
    color: white;
    border: 1px solid #444;
    display: none;
}

/* ===== LAYOUT ===== */

#menu{
    display:none;
    width:100%;
    height:100vh;
    background:#000;
    flex-direction:column;
    align-items:center;
}

#menuOtros{
    display:none;
    width:100%;
    height:100vh;
    background:#000;
    flex-direction:column;
    align-items:center;
}

/* ===== OTROS ===== */

#listaOtros{
    display:flex;
    gap:15px;
    flex-wrap:wrap;
    justify-content:center;
    padding:20px;
}

#titulo{
    font-size:42px;
    font-weight:bold;
    padding:40px 0 30px 0;
}

#listaCanales{
    display:flex;
    gap:15px;
    flex-wrap:wrap;
    justify-content:center;
    padding:20px;
}

.canal{
    min-width:180px;
    padding:20px;
    text-align:center;
    background:#111;
    border-radius:12px;
    border:1px solid #222;
    cursor:pointer;
    transition:.25s;
}

.canal:hover{
    transform:scale(1.05);
    background:#0066cc;
}

#player {
    display: none;
    flex: 1;
    position: relative;
    background: black;
    width: 100%;
    height: 100%;
}

video {
    width: 100%;
    height: 100%;
    object-fit: contain;
    background: black;
    max-height: 100%;
    max-width: 100%;
}

#mensaje {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%,-50%);
    background: rgba(0,0,0,.8);
    padding: 20px;
    border-radius: 10px;
    display: none;
}

#backBtn {
    position: fixed;
    top: 20px;
    left: 20px;
    z-index: 99999;
    width: 56px;
    height: 56px;
    border-radius: 50%;
    background: rgba(0,0,0,0.55);
    color: white;
    border: 2px solid rgba(255,255,255,0.35);
    font-size: 24px;
    font-weight: bold;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    opacity: 0;
    transform: scale(0.95);
    transition: all .25s ease;
    pointer-events: none;
}

#backBtn.show {
    opacity: 0.75;
    transform: scale(1);
    pointer-events: auto;
}

#backBtn:hover,
#backBtn:focus {
    opacity: 1;
    transform: scale(1.15);
    outline: none;
    border-color: white;
    box-shadow: 0 0 12px rgba(255,255,255,.5);
}

#backOtrosBtn{
    position: fixed;
    bottom: 45px;
    left: 50%;
    transform: translateX(-50%);
    padding: 18px 28px;
    font-size: 22px;
    border-radius: 10px;
    border: 1px solid #222;
    background: #111;
    color: white;

    cursor: pointer;
}

/* ===== YOUTUBE OVERLAY ===== */

#ytOverlay {
    position: fixed;
    inset: 0;
    background: black;
    display: none;
    z-index: 9999;
}

#ytFrame {
    width: 100%;
    height: 100%;
    border: 0;
}

#ytOverlay iframe {
    width: 100%;
    height: 100%;
    border: 0;
}

#backOtrosBtn{
    padding:18px 28px;
    font-size:22px;
    border-radius:10px;
    border:1px solid #222;
    background:#111;
    color:white;
    cursor:pointer;
}

#webOverlay {
    position: fixed;
    inset: 0;
    background: black;
    display: none;
    z-index: 10000;
}

#webFrame {
    width: 100%;
    height: 100%;
    border: 0;
}

#closeWebBtn {
    position: fixed;
    top: 10px;
    left: 10px;
    z-index: 10001;

    width: 44px;
    height: 44px;
    border-radius: 50%;

    background: rgba(0,0,0,0.25);
    color: white;
    border: 1px solid rgba(255,255,255,0.15);

    cursor: pointer;
}

</style>
</head>

<body>

<!-- SPLASH -->
<div id="inicioTVArg">
    <button id="enterBtn">▶ Ingresar a TVArg</button>
    <button id="installBtn">📲 Instalar TVArg</button>
</div>

<!-- MENU -->
<div id="menu">
    <div id="titulo">
        📺 TV ARG
    </div>
    <div id="listaCanales"></div>
</div>

<!-- MENU OTROS -->
<div id="menuOtros" style="display:none;">
    <div id="titulo">
        📁 OTROS
    </div>
    <div id="listaOtros"></div>
<button id="backOtrosBtn">↩ Volver</button>
</div>

<!-- PLAYER -->
<div id="player">

    <div id="mensaje"></div>

    <video id="video" controls autoplay></video>

</div>

<!-- YOUTUBE OVERLAY -->
<div id="ytOverlay">
    <iframe id="ytFrame"></iframe>
</div>

<!-- WEB OVERLAY (OTROS) -->
<div id="webOverlay">
    <iframe id="webFrame"></iframe>
</div>

<button id="backBtn">↩</button>

<script>

const canales = [
    { nombre:"América TV", tipo:"youtube", url:"https://www.youtube.com/embed/QeYYAKXyXHg?autoplay=1" },
    { nombre:"TV Pública", tipo:"youtube", url:"https://www.youtube.com/embed/MbykuXDfB1M?autoplay=1" },
    { nombre:"El Nueve", tipo:"youtube", url:"https://www.youtube.com/embed/C1DhpJ07ZuE?autoplay=1" },

    {
    nombre: "El Trece",
    tipo: "hls",
    url: "https://livetrx01.vodgc.net/eltrecetv/index.m3u8",
    headers: {
        Referer: "https://vodgc.net",
        "User-Agent": "Mozilla/5.0 (Linux; Android 8.0.0; Pixel 2 XL Build/OPD1.170816.004) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/93.0.4577.82 Mobile Safari/537.36"
    }
},
    
    { nombre:"TN", tipo:"hls", url:"https://live-01-01-tn.vodgc.net/TN_DAI_Beta/index.m3u8" },
    { nombre:"C5N", tipo:"youtube", url:"https://www.youtube.com/embed/VWhQ6xspnSc?autoplay=1" },
    { nombre:"Crónica", tipo:"youtube", url:"https://www.youtube.com/embed/JC7f3EUDaqw?autoplay=1" },
    { nombre:"LN+", tipo:"youtube", url:"https://www.youtube.com/embed/DVZ2rJQb_0g?autoplay=1" },
    { nombre:"A24", tipo:"youtube", url:"https://www.youtube.com/embed/ArKbAx1K-2U?autoplay=1" }, 
    { nombre: "9 Litoral", tipo: "hls", url:"https://stream.arcast.live/canal9litoral/ngrp:canal9litoral_all/playlist.m3u8"},
    { nombre:"Canal 26", tipo:"hls", url:"https://stream-gtlc.telecentro.net.ar/hls/canal26hls/main.m3u8" }
];

const otros = [
    { nombre: "América", tipo: "web", url: "https://www.americatv.com.ar", modo: "external" },
    { nombre: "Mi Telefe", tipo: "web", url: "https://www.mitelefe.com/telefe-en-vivo", modo: "external" }
];

let estado = "splash";
let estadoAnterior = "";
let inactivityTimer;

const menu = document.getElementById("menu");
const video = document.getElementById("video");
const mensaje = document.getElementById("mensaje");
const splash = document.getElementById("inicioTVArg");
const enterBtn = document.getElementById("enterBtn");
const installBtn = document.getElementById("installBtn");
const backBtn = document.getElementById("backBtn");
const player = document.getElementById("player");

/* ===== SPLASH ===== */

enterBtn.onclick = () => {
    splash.style.display = "none";
    menu.style.display = "flex";
    estado = "menu";
};

if (window.matchMedia('(display-mode: standalone)').matches ||
    window.navigator.standalone === true) {
    splash.style.display = "none";
    menu.style.display = "flex";
    estado = "menu";
}

/* ===== YOUTUBE PARSER ===== */

function getYouTubeEmbed(url) {

    try {
        const u = new URL(url);

        let id = u.searchParams.get("v");

        // soporte shorts
        if (!id && u.pathname.includes("/shorts/")) {
            id = u.pathname.split("/shorts/")[1];
        }

        if (!id) return null;

        return `https://www.youtube.com/embed/${id}`;

    } catch {
        return null;
    }
}

/* ===== PLAYER ===== */
function mostrarMensaje(texto) {

    mensaje.textContent = texto;
    mensaje.style.display = "block";

    setTimeout(() => {
        mensaje.style.display = "none";
    }, 3000);
}

function salirDelPlayer() {

    video.pause();
    video.removeAttribute("src");
    video.srcObject = null;
    video.load();

    document.getElementById("ytOverlay").style.display = "none";
    document.getElementById("ytFrame").src = "";

    backBtn.classList.remove("show");
    backBtn.style.opacity = "0";

    clearTimeout(inactivityTimer);
    }

function showOtrosMenu() {

    if (window.AndroidTVArg) {
        AndroidTVArg.setMenuPrincipal(false);
    }

    menu.style.display = "none";

    const menuOtros = document.getElementById("menuOtros");
    const backOtrosBtn = document.getElementById("backOtrosBtn");

    menuOtros.style.display = "flex";

    backBtn.classList.remove("show");
    backBtn.style.opacity = "0";

    backOtrosBtn.style.display = "block";
    backOtrosBtn.style.opacity = "1";
    backOtrosBtn.style.pointerEvents = "auto";

    estado = "otros";
}

function abrirWeb(url, modo = "webview") {
    if (modo === "external") {
        abrirNavegadorExterno(url);
        return;
    }
    estadoAnterior = estado;
    const overlay = document.getElementById("webOverlay");
    const frame = document.getElementById("webFrame");
    frame.src = url;
    overlay.style.display = "block";
    backBtn.classList.add("show");
    mostrarBackBtn();
    estado = "web";
}
function cargarCanal(canal) {

    if (window.AndroidTVArg) {
        AndroidTVArg.setMenuPrincipal(false);
    }

    estado = "player";

    // =========================
    // 1. LIMPIEZA BASE
    // =========================
    video.pause();
    video.removeAttribute("src");
    video.srcObject = null;
    video.load();

    video.style.display = "none";

    const iframe = document.getElementById("ytFrame");
    const overlay = document.getElementById("ytOverlay");

    iframe.src = "";
    overlay.style.display = "none";

    menu.style.display = "none";
    player.style.display = "flex";

    // =========================
    // 2. YOUTUBE
    // =========================
    if (canal.tipo === "youtube") {

        iframe.src = canal.url;

        iframe.allow =
            "accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share";

        iframe.referrerPolicy =
            "strict-origin-when-cross-origin";

        iframe.allowFullscreen = true;

        overlay.style.display = "block";

        backBtn.classList.add("show");
        mostrarBackBtn();
        return;
    }

    // =========================
    // 3. HLS → MEDIA3 (ANDROID)
    // =========================
if (estado === "player") {

    salirDelPlayer();

    player.style.display = "none";
    menu.style.display = "flex";

    document.getElementById("ytOverlay").style.display = "none";
    document.getElementById("webOverlay").style.display = "none";

    backBtn.classList.remove("show");

    if (window.AndroidTVArg) {
        AndroidTVArg.setMenuPrincipal(true);
    }

    estado = "menu";
    return;
}

/* ===== MENU ===== */

canales.forEach(canal => {
    const div = document.createElement("div");
    div.className = "canal";
    div.textContent = canal.nombre;
    div.onclick = () => cargarCanal(canal);
    document.getElementById("listaCanales").appendChild(div);
});

// botón OTROS
const otrosBtn = document.createElement("div");
otrosBtn.className = "canal";
otrosBtn.textContent = "➕ OTROS";

otrosBtn.onclick = () => {
    showOtrosMenu();
};

document.getElementById("listaCanales").appendChild(otrosBtn);


/* ===== OTRO MENU ===== */

otros.forEach(item => {

    const div = document.createElement("div");
    div.className = "canal";
    div.textContent = item.nombre;

    div.onclick = () => {
    // si está marcado como externo → Android abre navegador real
    if (item.modo === "external" && window.AndroidTVArg) {
        AndroidTVArg.openUrl(item.url);
        return;
    }
    // si no → sigue tu flujo normal
    abrirWeb(item.url);
};

    document.getElementById("listaOtros").appendChild(div);
});


/* ===== BACK ===== */

backBtn.onclick = () => {

    if (estado === "web") {

        document.getElementById("webOverlay").style.display = "none";
        document.getElementById("webFrame").src = "";

        backBtn.classList.remove("show");
        backBtn.style.opacity = "0";

        clearTimeout(inactivityTimer);

        if (estadoAnterior === "otros") {

            document.getElementById("menuOtros").style.display = "flex";
            menu.style.display = "none";
            estado = "otros";

        } else {

            menu.style.display = "flex";
            document.getElementById("menuOtros").style.display = "none";

            if (window.AndroidTVArg) {
                AndroidTVArg.setMenuPrincipal(true);
            }

            estado = "menu";
        }

        return;
    }

    if (estado === "player") {

        salirDelPlayer();

        player.style.display = "none";

        menu.style.display = "flex";

        if (window.AndroidTVArg) {
            AndroidTVArg.setMenuPrincipal(true);
        }

        estado = "menu";

        return;
    }

};

/* =====      ===== */

document.getElementById("backOtrosBtn").onclick = () => {

    document.getElementById("menuOtros").style.display = "none";
    menu.style.display = "flex";

    if (window.AndroidTVArg) {
        AndroidTVArg.setMenuPrincipal(true);
    }

    estado = "menu";
};


/* ===== BACK INTELIGENTE TV ===== */

function mostrarBackBtn() {

    if (!backBtn.classList.contains("show")) {
        return;
    }

    backBtn.style.opacity = "0.75";

    clearTimeout(inactivityTimer);

    inactivityTimer = setTimeout(() => {

        if (backBtn.classList.contains("show")) {
            backBtn.style.opacity = "0.25";
        }

    }, 5000);
}

/* cualquier actividad vuelve a iluminarlo */

document.addEventListener("keydown", () => {
    mostrarBackBtn();
});

document.addEventListener("mousemove", () => {
    mostrarBackBtn();
});

document.addEventListener("click", () => {
    mostrarBackBtn();
});

/* ===== DEPURACIÓN TECLAS ===== */

document.addEventListener("keydown", e => {

    console.log(
        "KEY =", e.key,
        "KEYCODE =", e.keyCode,
        "WHICH =", e.which
    );

});


/* ===== BACK ENVIADO DESDE ANDROID ===== */

window.addEventListener("tvback", () => {

    if (backBtn.classList.contains("show")) {
        backBtn.click();
        return;
    }

    if (estado === "otros") {
        document.getElementById("backOtrosBtn").click();
        return;
    }

});


</script>

</body>
</html>
