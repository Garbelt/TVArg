<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>TV Argentina</title>

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#111111">

<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

<style>

* { box-sizing: border-box; }

body {
    margin: 0;
    background: #000;
    color: white;
    font-family: Arial, sans-serif;
    display: flex;
    height: 100vh;
}

/* ===== SPLASH ===== */
#inicioTVArg {
    position: fixed;
    inset: 0;
    background: #000;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    gap: 20px;
    z-index: 9999;
}

#inicioTVArg button {
    padding: 18px 28px;
    font-size: 22px;
    border-radius: 10px;
    border: none;
    cursor: pointer;
}

#enterBtn { background: #0066cc; color: white; }

#installBtn {
    background: #222;
    color: white;
    border: 1px solid #444;
    display: none;
}

/* ===== LAYOUT ===== */

#menu{
    display:none;
    width:100%;
    height:100vh;
    background:#000;
    flex-direction:column;
    align-items:center;
}

#menuOtros{
    display:none;
    width:100%;
    height:100vh;
    background:#000;
    flex-direction:column;
    align-items:center;
}

/* ===== OTROS ===== */

#listaOtros{
    display:flex;
    gap:15px;
    flex-wrap:wrap;
    justify-content:center;
    padding:20px;
}

#backOtrosBtn{
    margin-top:20px;
    padding:12px 25px;
    border-radius:10px;
    border:1px solid #333;
    background:#111;
    color:white;
    cursor:pointer;
}


/* ================ */

#titulo{
    font-size:42px;
    font-weight:bold;
    padding:40px 0 30px 0;
}

#listaCanales{
    display:flex;
    gap:15px;
    flex-wrap:wrap;
    justify-content:center;
    padding:20px;
}

.canal{
    min-width:180px;
    padding:20px;
    text-align:center;
    background:#111;
    border-radius:12px;
    border:1px solid #222;
    cursor:pointer;
    transition:.25s;
}

.canal:hover{
    transform:scale(1.05);
    background:#0066cc;
}

#player {
    display:none;
    flex: 1;
    position: relative;
    background: black;
}

video {
    width: 100%;
    height: 100%;
}

#mensaje {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%,-50%);
    background: rgba(0,0,0,.8);
    padding: 20px;
    border-radius: 10px;
    display: none;
}

#backBtn {
    position: fixed;
    top: 20px;
    left: 20px;
    z-index: 99999;

    width: 60px;
    height: 60px;
    border-radius: 50%;

    background: rgba(20, 20, 20, 0.85);
    color: white;

    border: 2px solid rgba(255,255,255,0.25);

    font-size: 24px;

    display: flex;
    align-items: center;
    justify-content: center;

    cursor: pointer;

    opacity: 0;
    pointer-events: none;
    transform: scale(0.9);

    box-shadow: 0 4px 15px rgba(0,0,0,0.6);
    transition: transform 0.2s ease, background 0.2s ease, opacity 0.2s ease;
}

#backBtn.show {
    opacity: 0.85;
    pointer-events: auto;
    transform: scale(1);
}

#backBtn:hover {
    opacity: 1;
    transform: scale(1.25);
    background: rgba(0,0,0,0.6);
}

#backBtn:focus {
    transform: scale(1.15);
    background: rgba(40, 40, 40, 0.95);
    outline: none;
}

/* ===== YOUTUBE OVERLAY ===== */

#ytOverlay {
    position: fixed;
    inset: 0;
    background: black;
    display: none;
    z-index: 9999;
}

#ytFrame {
    width: 100%;
    height: 100%;
    border: 0;
}

#ytOverlay iframe {
    width: 100%;
    height: 100%;
    border: 0;
}

</style>
</head>

<body>

<!-- SPLASH -->
<div id="inicioTVArg">
    <button id="enterBtn">▶ Ingresar a TVArg</button>
    <button id="installBtn">📲 Instalar TVArg</button>
</div>

<!-- MENU -->
<div id="menu">
    <div id="titulo">
        📺 TV ARG
    </div>
    <div id="listaCanales"></div>
</div>

<!-- MENU OTROS -->
<div id="menuOtros" style="display:none;">
    <div id="titulo">📁 OTROS</div>

    <div id="listaOtros"></div>

    <button id="backOtrosBtn">↩ Volver</button>
</div>

<!-- PLAYER -->
<div id="player">

    <div id="mensaje"></div>

    <video id="video" controls autoplay></video>

</div>

<!-- YOUTUBE OVERLAY -->
<div id="ytOverlay">
    <iframe id="ytFrame"></iframe>
</div>

<button id="backBtn">↩</button>

<script>

const canales = [
    { nombre:"TV Pública", tipo:"youtube", url:"https://www.youtube.com/embed/eQLBmCEBp50?autoplay=1"},
    { nombre:"El Nueve", tipo:"youtube", url:"https://www.youtube.com/embed/C1DhpJ07ZuE?autoplay=1"},
    { nombre:"TN", tipo:"hls", url:"https://live-01-01-tn.vodgc.net/TN_DAI_Beta/index.m3u8"},
    { nombre:"C5N", tipo:"youtube", url:"https://www.youtube.com/embed/VWhQ6xspnSc?autoplay=1"},
    { nombre:"Crónica", tipo:"youtube", url:"https://www.youtube.com/embed/JC7f3EUDaqw?autoplay=1"},
    { nombre:"LN+", tipo:"youtube", url:"https://www.youtube.com/embed/DVZ2rJQb_0g?autoplay=1"},
    { nombre:"A24", tipo:"youtube", url:"https://www.youtube.com/embed/ArKbAx1K-2U?si=zd3Rhtf_wPZ0lkDZ?autoplay=1"}, 
    { nombre: "9 Litoral", tipo: "hls", url:"https://stream.arcast.live/canal9litoral/ngrp:canal9litoral_all/playlist.m3u8"},
    { nombre:"Canal 26", tipo:"hls", url:"https://stream-gtlc.telecentro.net.ar/hls/canal26hls/main.m3u8"}
];

const otros = [
    { nombre: "Mi Telefe", tipo: "embed", url: "https://www.mitelefe.com/mundial-x-telefe/transmision-en-vivo" },
    { nombre: "ChocoPop", tipo: "embed", url: "https://www.chocopopflow.com" }
];


let hls;
let estado = "splash";

const menu = document.getElementById("menu");
const video = document.getElementById("video");
const mensaje = document.getElementById("mensaje");
const splash = document.getElementById("inicioTVArg");
const enterBtn = document.getElementById("enterBtn");
const installBtn = document.getElementById("installBtn");
const backBtn = document.getElementById("backBtn");
const player = document.getElementById("player");

/* ===== SPLASH ===== */

enterBtn.onclick = () => {
    splash.style.display = "none";
    menu.style.display = "flex";
    estado = "menu";
};

if (window.matchMedia('(display-mode: standalone)').matches ||
    window.navigator.standalone === true) {
    splash.style.display = "none";
    menu.style.display = "flex";
    estado = "menu";
}


function actualizarBackBtn() {
    if (estado === "player") {
        backBtn.classList.add("show");
    } else {
        backBtn.classList.remove("show");
    }
}

/* ===== YOUTUBE PARSER ===== */

function getYouTubeEmbed(url) {

    try {
        const u = new URL(url);

        let id = u.searchParams.get("v");

        // soporte shorts
        if (!id && u.pathname.includes("/shorts/")) {
            id = u.pathname.split("/shorts/")[1];
        }

        if (!id) return null;

        return `https://www.youtube.com/embed/${id}`;

    } catch {
        return null;
    }
}

/* ===== PLAYER ===== */
function mostrarMensaje(texto) {

    mensaje.textContent = texto;
    mensaje.style.display = "block";

    setTimeout(() => {
        mensaje.style.display = "none";
    }, 3000);
}


function cargarCanal(canal){

    estado = "player";
    actualizarBackBtn();

    menu.style.display = "none";
    player.style.display = "block";

    // reset HLS
    if (hls) {
        hls.destroy();
        hls = null;
    }

    video.pause();
    video.removeAttribute("src");
    video.load();

    video.style.display = "block";

    // limpiar youtube anterior
    const overlay = document.getElementById("ytOverlay");
    const iframe = document.getElementById("ytFrame");
    iframe.src = "";

/* ===== YOUTUBE ===== */
if (canal.tipo === "youtube") {

    const overlay = document.getElementById("ytOverlay");
    const iframe = document.getElementById("ytFrame");

    iframe.src = canal.url;

    iframe.allow =
    "accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share";

    iframe.referrerPolicy =
    "strict-origin-when-cross-origin";

    iframe.allowFullscreen = true;

    overlay.style.display = "block";

    return;
}

    /* ===== HLS ===== */
    if (canal.tipo === "hls" && Hls.isSupported()) {

        hls = new Hls();
        hls.loadSource(canal.url);
        hls.attachMedia(video);

        hls.on(Hls.Events.MANIFEST_PARSED, () => {
            video.play();
        });

        hls.on(Hls.Events.ERROR, () => {
            mostrarMensaje("Error cargando canal");
        });
    }

}



function cargarEmbed(item) {

    estado = "player";
    actualizarBackBtn();

    menu.style.display = "none";
    player.style.display = "block";

    // limpiar HLS
    if (hls) {
        hls.destroy();
        hls = null;
    }

    video.pause();
    video.removeAttribute("src");
    video.load();

    video.style.display = "none";

    const overlay = document.getElementById("ytOverlay");
    const iframe = document.getElementById("ytFrame");

    iframe.src = item.url;

    iframe.allow =
        "autoplay; fullscreen; clipboard-write; encrypted-media; picture-in-picture";

    iframe.referrerPolicy = "strict-origin-when-cross-origin";

    overlay.style.display = "block";
}
/* ===== MENU ===== */

canales.forEach(canal => {
    const div = document.createElement("div");
    div.className = "canal";
    div.textContent = canal.nombre;
    div.onclick = () => cargarCanal(canal);
    document.getElementById("listaCanales").appendChild(div);
});

/* ===== OTRO MENU ===== */

otros.forEach(item => {

    const div = document.createElement("div");
    div.className = "canal";
    div.textContent = item.nombre;

    div.onclick = () => cargarEmbed(item);

    document.getElementById("listaOtros").appendChild(div);
});


/* ===== BACK ===== */

document.getElementById("backOtrosBtn").onclick = () => {
    document.getElementById("menuOtros").style.display = "none";
    menu.style.display = "flex";
};



backBtn.onclick = () => {

    estado = "menu";

    // ===== HLS cleanup =====
    if (hls) {
        hls.destroy();
        hls = null;
    }

    video.pause();
    video.removeAttribute("src");
    video.load();
    video.style.display = "block";

    // ===== YouTube / Embed overlay cleanup =====
    const overlay = document.getElementById("ytOverlay");
    const iframe = document.getElementById("ytFrame");

    overlay.style.display = "none";
    iframe.src = "";

    // ===== UI reset =====
    splash.style.display = "none";
    menu.style.display = "flex";
    document.getElementById("menuOtros").style.display = "none";

    mensaje.style.display = "none";

    // ===== back button state =====
    actualizarBackBtn();
};


const btnOtros = document.createElement("div");
btnOtros.className = "canal";
btnOtros.textContent = "➕ OTROS";

btnOtros.onclick = () => {
    menu.style.display = "none";
    document.getElementById("menuOtros").style.display = "flex";
    estado = "menu";
    actualizarBackBtn();
};

document.getElementById("listaCanales").appendChild(btnOtros);


document.addEventListener("keydown", (e) => {

    // KEYCODE 27 = ESC (PC / algunos browsers TV)
    // KEYCODE 10009 = BACK (Samsung Tizen)
    // KEYCODE 461 = BACK (LG WebOS)
    // KEYCODE 8 = Backspace (algunos Android TV / remotos)
    
    const backKeys = [27, 461, 10009, 8];

    if (backKeys.includes(e.keyCode)) {

        if (estado === "player") {
            backBtn.onclick();
            e.preventDefault();
        }
    }
});

</script>

</body>
</html>
